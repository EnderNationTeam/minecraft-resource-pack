name: Validate JSON Schemas

on:
    push:
        branches:
            - master

jobs:
    validate:
        runs-on: ubuntu-latest
        steps:
            - name: Checkout Repository
              uses: actions/checkout@v4

            - name: Setup Node.js
              uses: actions/setup-node@v4
              with:
                  node-version: "22"

            - name: Install ajv-cli
              run: npm install -g ajv-cli ajv-formats

            - name: Validate GeyserMC mappings
              run: |
                  ajv validate \
                    -s .vscode/schemas/geysermc-mappings.schema.json \
                    -d "geysermc/**/*.json" \
                    --spec=draft7

            - name: Validate Java item definitions
              run: |
                  ajv validate \
                    -s .vscode/schemas/java-item-definition.schema.json \
                    -d "java/assets/*/items/**/*.json" \
                    --spec=draft7

            - name: Validate Java models
              run: |
                  ajv validate \
                    -s .vscode/schemas/java-model.schema.json \
                    -d "java/assets/*/models/**/*.json" \
                    --spec=draft7

            - name: Validate pack.mcmeta
              run: |
                  ajv validate \
                    -s .vscode/schemas/minecraft-pack-mcmeta.json \
                    -d "java/pack.mcmeta" \
                    --spec=draft7

            - name: Validate Java lang files
              run: |
                  ajv validate \
                    -s .vscode/schemas/minecraft-lang.json \
                    -d "java/assets/*/lang/*.json" \
                    --spec=draft7

            - name: Validate Bedrock files
              run: |
                  ajv validate \
                    -s .vscode/schemas/bedrock-schema.json \
                    -d "bedrock/**/*.json" \
                    --spec=draft7
